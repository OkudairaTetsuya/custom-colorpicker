<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>名入れカスタマイズ | スマホケース</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,700;1,700&family=Sacramento&family=Alex+Brush&family=Noto+Serif+JP:wght@400;700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style_nameprint.css">
</head>
<body>

  <!-- 固定保存バー -->
  <div class="save-bar" id="save-bar">
    <button class="save-btn" id="save-btn">
      <span class="save-btn-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        デザインを保存・共有
      </span>
      <span class="save-btn-loading">
        <span class="spinner"></span>保存中…
      </span>
    </button>
  </div>

  <div id="main-app">
  <div class="app">

    <div class="pc-layout">

      <!-- 左カラム: スマホ プレビュー -->
      <div class="pc-left">
        <div class="card" id="card-preview">
          <div class="preview-inner">
            <!-- 機種セレクター（ブランド→機種の2ステップ） -->
            <div class="model-selector-wrap" id="model-selector-wrap">
              <!-- ステップ1: ブランド選択 -->
              <div class="ms-step" id="ms-brand-step">
                <p class="ms-label">メーカーを選択</p>
                <div class="brand-grid" id="brand-grid">
                  <!-- JSで動的生成 -->
                </div>
              </div>
              <!-- ステップ2: 機種選択 -->
              <div class="ms-step" id="ms-model-step">
                <div class="ms-back-row">
                  <button class="ms-back-btn" id="ms-back-btn" type="button">← 戻る</button>
                  <span class="ms-brand-label" id="ms-brand-label"></span>
                </div>
                <div class="model-list" id="model-list">
                  <!-- JSで動的生成 -->
                </div>
              </div>
            </div>
            <!-- 選択済みチップ -->
            <div class="model-selected-bar" id="model-selected-bar">
              <span class="model-selected-name" id="model-selected-name"></span>
              <button class="model-change-btn" id="model-change-btn" type="button">変更</button>
            </div>
            <div class="canvas-stage" id="canvas-stage">
              <div class="canvas-wrap" id="canvas-wrap">
                <canvas id="main-canvas"></canvas>
              </div>
              <!-- 未選択プレースホルダー -->
              <div class="canvas-placeholder" id="canvas-placeholder">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#C7C7CC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17" r="1" fill="#C7C7CC" stroke="none"/></svg>
                <p>機種を選択してください</p>
              </div>
              <!-- 画像ローディングバー -->
              <div class="canvas-loader" id="canvas-loader">
                <div class="canvas-loader-bar"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 右カラム: カスタマイズステップ -->
      <div class="pc-right">

        <!-- モバイル: ステップインジケーター -->
        <div class="step-indicator" id="step-indicator">
          <button class="step-dot active" data-step="0">
            <span class="step-dot-num">1</span>
            <span class="step-dot-label">本体カラー</span>
          </button>
          <button class="step-dot" data-step="1">
            <span class="step-dot-num">2</span>
            <span class="step-dot-label">名入れ</span>
          </button>
          <button class="step-dot" data-step="2">
            <span class="step-dot-num">3</span>
            <span class="step-dot-label">フォント</span>
          </button>
          <button class="step-dot" data-step="3">
            <span class="step-dot-num">4</span>
            <span class="step-dot-label">文字色</span>
          </button>
          <button class="step-dot" data-step="4">
            <span class="step-dot-num">5</span>
            <span class="step-dot-label">配置</span>
          </button>
        </div>

        <!-- ステップ 1: 本体カラー -->
        <div class="card step-card active" data-step-idx="0" id="step-card-0">
          <button class="ac-header pc-ac-header" data-target="step-body-0">
            <span class="ac-title"><span class="ac-num">1</span>本体カラー</span>
            <svg class="ac-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="step-body" id="step-body-0">
            <div class="step-inner">
              <!-- ケース本体カラー -->
              <div class="case-color-row">
                <span class="ctrl-label">ケース素材</span>
                <div class="color-toggle">
                  <button class="toggle-btn active" id="toggle-BLK" data-color="BLK">
                    <span class="toggle-swatch" style="background:#1a1a1a;"></span>ブラック
                  </button>
                  <button class="toggle-btn" id="toggle-BGE" data-color="BGE">
                    <span class="toggle-swatch" style="background:#d4b896;"></span>ベージュ
                  </button>
                </div>
              </div>
              <!-- 色相スライダー（上） -->
              <div class="row-hue" style="margin-bottom:12px;">
                <div class="hue-track" style="flex:1;">
                  <input type="range" id="hue-slider" class="hue-slider" min="0" max="360" value="0" step="1" aria-label="色相">
                </div>
              </div>
              <!-- SV マップ（下） -->
              <div class="sv-map" id="sv-map">
                <div class="sv-cursor" id="sv-cursor"></div>
              </div>
              <!-- HEX 表示（コピーボタンなし） -->
              <div class="row-hex" style="margin-top:8px;">
                <div class="hex-chip" id="hex-chip"></div>
                <span class="hex-label-text">HEX</span>
                <code class="hex-code" id="hex-code">#FFFFFF</code>
              </div>
              <!-- 免責テキスト -->
              <p class="disclaimer" style="margin-top:12px;">
                ※画面上の色・フォントはイメージです。実際の印刷と異なる場合があります。
              </p>
            </div>
          </div>
        </div>

        <!-- ステップ 2: 名入れ -->
        <div class="card step-card" data-step-idx="1" id="step-card-1">
          <button class="ac-header pc-ac-header" data-target="step-body-1">
            <span class="ac-title"><span class="ac-num">2</span>名入れ内容</span>
            <svg class="ac-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="step-body" id="step-body-1">
            <div class="step-inner">
              <div class="np-row">
                <input type="text" id="text-input" class="np-text-input" placeholder="名前やメッセージを入力…" maxlength="30">
              </div>
              <div class="np-row text-layer-btns">
                <button type="button" id="add-text-btn" class="align-btn">＋ テキストを追加</button>
                <button type="button" id="del-text-btn" class="align-btn align-btn-danger">✕ 削除</button>
              </div>
            </div>
          </div>
        </div>

        <!-- ステップ 3: フォント -->
        <div class="card step-card" data-step-idx="2" id="step-card-2">
          <button class="ac-header pc-ac-header" data-target="step-body-2">
            <span class="ac-title"><span class="ac-num">3</span>フォント・サイズ</span>
            <svg class="ac-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="step-body" id="step-body-2">
            <div class="step-inner">
              <!-- ビジュアルフォントグリッド -->
              <div class="font-grid" id="font-grid">
                <button type="button" class="font-card selected" data-value="Roboto">
                  <span class="font-card-preview" style="font-family:'Roboto',sans-serif;">Aa Bb 123</span>
                </button>
                <button type="button" class="font-card" data-value="Sacramento">
                  <span class="font-card-preview" style="font-family:'Sacramento',cursive;">Aa Bb 123</span>
                </button>
                <button type="button" class="font-card" data-value="Alex Brush">
                  <span class="font-card-preview" style="font-family:'Alex Brush',cursive;">Aa Bb 123</span>
                </button>
                <button type="button" class="font-card" data-value="Noto Serif JP">
                  <span class="font-card-preview" style="font-family:'Noto Serif JP',serif;">あいうえお</span>
                </button>
                <button type="button" class="font-card" data-value="Noto Sans">
                  <span class="font-card-preview" style="font-family:'Noto Sans',sans-serif;">あいうえお</span>
                </button>
              </div>
              <!-- サイズスライダー -->
              <div class="np-row np-row-slider" style="margin-top:16px;">
                <span class="ctrl-label">サイズ</span>
                <div class="hue-track" style="flex:1;">
                  <input type="range" id="font-size" class="gray-slider" min="12" max="80" value="36" step="1">
                </div>
                <span class="size-badge" id="size-badge">36</span>
              </div>
            </div>
          </div>
        </div>

        <!-- ステップ 4: 文字色 -->
        <div class="card step-card" data-step-idx="3" id="step-card-3">
          <button class="ac-header pc-ac-header" data-target="step-body-3">
            <span class="ac-title"><span class="ac-num">4</span>文字色</span>
            <svg class="ac-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="step-body" id="step-body-3">
            <div class="step-inner">
              <!-- 色相スライダー（上） -->
              <div class="row-hue" style="margin-bottom:12px;">
                <div class="hue-track" style="flex:1;">
                  <input type="range" id="tc-hue-slider" class="hue-slider" min="0" max="360" value="0" step="1" aria-label="文字色 色相">
                </div>
              </div>
              <!-- SV マップ（下） -->
              <div class="tc-sv-map" id="tc-sv-map">
                <div class="tc-sv-cursor" id="tc-sv-cursor"></div>
              </div>
              <div class="row-hex" style="margin-top:8px;">
                <div class="hex-chip" id="tc-hex-chip"></div>
                <span class="hex-label-text">HEX</span>
                <code class="hex-code" id="tc-hex-code">#000000</code>
              </div>
            </div>
          </div>
        </div>

        <!-- ステップ 5: 配置 -->
        <div class="card step-card" data-step-idx="4" id="step-card-4">
          <button class="ac-header pc-ac-header" data-target="step-body-4">
            <span class="ac-title"><span class="ac-num">5</span>配置・回転</span>
            <svg class="ac-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="step-body" id="step-body-4">
            <div class="step-inner">
              <div class="np-row">
                <span class="ctrl-label">配置</span>
                <div class="align-btns">
                  <button class="align-btn" data-align="top">▲ 上部</button>
                  <button class="align-btn" data-align="center">● 中央</button>
                  <button class="align-btn" data-align="bottom">▼ 下部</button>
                </div>
              </div>
              <div class="np-row">
                <span class="ctrl-label">回転</span>
                <div class="align-btns">
                  <button class="align-btn" id="rotate-ccw">↺ 反時計回り</button>
                  <button class="align-btn" id="rotate-cw">↻ 時計回り</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- モバイル: ステップナビゲーション -->
        <div class="step-nav" id="step-nav">
          <button id="step-prev-btn" class="step-nav-btn" disabled>← 戻る</button>
          <span class="step-counter" id="step-counter">1 / 5</span>
          <button id="step-next-btn" class="step-nav-btn step-nav-next">次へ →</button>
        </div>

      </div><!-- /.pc-right -->
    </div><!-- /.pc-layout -->

  </div><!-- /.app -->
  </div><!-- /#main-app -->

  <!-- 共有URLモーダル -->
  <div class="share-modal" id="share-modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="share-modal-title">
    <div class="share-modal-inner">
      <p class="share-modal-title" id="share-modal-title">デザインを保存しました</p>

      <p class="share-section-label">呼び出しID</p>
      <div class="share-url-row">
        <code class="share-id-code" id="share-id-code"></code>
        <button class="share-copy-btn" id="share-id-copy-btn">コピー</button>
      </div>
      <p class="share-copy-msg" id="share-id-copy-msg">コピーしました</p>

      <p class="share-section-label" style="margin-top:12px;">共有URL</p>
      <div class="share-url-row">
        <input type="text" id="share-url-input" class="share-url-input" readonly aria-label="共有URL">
        <button class="share-copy-btn" id="share-copy-btn">コピー</button>
      </div>
      <p class="share-copy-msg" id="share-copy-msg">コピーしました</p>

      <button class="share-close-btn" id="share-close-btn">閉じる</button>
    </div>
  </div>

  <!-- デザイン呼び出しフッター -->
  <div class="recall-footer">
    <div class="recall-inner">
      <p class="recall-title">保存済みデザインを呼び出す</p>
      <div class="recall-row">
        <input type="text" id="recall-id-input" class="recall-input"
               placeholder="呼び出しID を入力" autocomplete="off" spellcheck="false">
        <button type="button" id="recall-btn" class="recall-btn">読み込む</button>
      </div>
      <p class="recall-msg" id="recall-msg"></p>
    </div>
  </div>

  <!-- エラートースト -->
  <div class="error-toast" id="error-toast" role="alert" aria-live="assertive"></div>

  <!-- 読み込みオーバーレイ（?id= 指定時） -->
  <div class="load-overlay hidden" id="load-overlay" aria-hidden="true">
    <div class="load-overlay-spinner"></div>
    <p class="load-overlay-text">デザインを読み込んでいます…</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.config.js"></script>
  <script src="script_nameprint.js"></script>
</body>
</html>
